<!DOCTYPE html>
<html>
<head>
    <title>Menghitung Nilai</title>
</head>
<body>

    <h2>Menghitung Nilai</h2>

    <form action="HitungNilai" method="post">

        <table>

            <tr>
                <td>Jumlah hadir</td>
                <td>
                    <input type="text" name="hadir">
                </td>
            </tr>

            <tr>
                <td>Jumlah pertemuan</td>
                <td>
                    <input type="text" name="pertemuan">
                </td>
            </tr>

            <tr>
                <td>Nilai tugas</td>
                <td>
                    <input type="text" name="tugas">
                </td>
            </tr>

            <tr>
                <td>Nilai UTS</td>
                <td>
                    <input type="text" name="uts">
                </td>
            </tr>

            <tr>
                <td>Nilai UAS</td>
                <td>
                    <input type="text" name="uas">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="submit" value="Hitung">
                </td>
            </tr>

        </table>

    </form>

</body>
</html>
